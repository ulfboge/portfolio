site_name: "Johan Karlsson – GIS & Remote Sensing Portfolio"
site_description: "Portfolio of Johan Karlsson — GIS, Remote Sensing, Carbon MRV, and Spatial Data Science"
site_author: "Johan Karlsson"
site_url: "https://ulfboge.github.io/portfolio"

theme:
  name: material
  icon:
    logo: material/earth
  palette:
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Carbon & MRV":
      - "Overview": projects/carbon-mrv/index.md
      - "Gold Standard MRV Pipeline": projects/carbon-mrv/gold-standard.md
      - "VM0047 Performance Benchmark": projects/carbon-mrv/vm0047-pb.md
      - "Soil Carbon Modeling": projects/carbon-mrv/soil-carbon.md
      - "Wildlands League – Ecosystem Services": projects/carbon-mrv/wildlands-league.md
    - "Forest & Mangrove Change":
      - "Overview": projects/forest-change/index.md
      - "CO2 Operate Cameroon Highlands": projects/forest-change/co2-operate-cameroon.md
      - "Tiko Mangrove Threat Mapping": projects/forest-change/tiko-mangrove.md
      - "VoNat Mont Mbam": projects/forest-change/vonat-mont-mbam.md
      - "VoNat Tiko Mangroves": projects/forest-change/vonat-tiko-mangroves.md
      - "Skogsmonitor GEE Demo": projects/forest-change/skogsmonitor.md
    - "Biodiversity & NRM":
      - "Overview": projects/biodiversity/index.md
      - "Madagascar Lemur SDM": projects/biodiversity/madagascar-lemur-sdm.md
      - "NVI – Naturvärdesinventering": projects/biodiversity/nvi.md
      - "Maps Portfolio": projects/biodiversity/maps-portfolio.md
    - "Web Apps & Data Pipelines":
      - "Overview": projects/web-apps/index.md
      - "Miljögifter i svenska sjöar": projects/web-apps/miljogifter.md
      - "Geodata Pipeline Demo": projects/web-apps/geodata-pipeline.md
      - "MGIS-Downloader": projects/web-apps/mgis-downloader.md
    - "Test Projects":
      - "Overview": projects/test-projects/index.md
      - "GlosCoach": projects/test-projects/gloscoach.md
      - "SIF P2015": projects/test-projects/sif-p2015.md
      - "Stocksunds IF Loppsmarknad": projects/test-projects/loppsmarknad.md
  - Experience: experience.md
  - Contact: contact.md

